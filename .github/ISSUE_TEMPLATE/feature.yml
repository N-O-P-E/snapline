name: Feature request
description: Suggest something Snapline should do.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Snapline keeps a deliberately small surface area. Features that simplify the core flow (snap → paste) are easier to land than features that broaden scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to accomplish that Snapline doesn't currently support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change? UI, behavior, hotkey, settings — sketch it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve this you thought about.
  - type: dropdown
    id: platform
    attributes:
      label: Which platforms should this affect?
      multiple: true
      options:
        - macOS
        - Windows
    validations:
      required: true
